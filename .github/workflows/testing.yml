name: Find Truth

on:
  workflow_dispatch:

jobs:
  find-truth:
    runs-on: ubuntu-latest
    steps:
      - name: 探测真实下载路径
        run: |
          echo "--- 正在请求 GitHub API 获取该项目最新的 Release 信息 ---"
          # 使用 API 获取最新版本的信息
          RESPONSE=$(curl -s https://api.github.com/repos/nilaoda/N_m3u8DL-RE/releases/latest)
          
          echo "--- 解析下载列表 ---"
          # 提取所有包含 linux-x64 的下载链接
          echo "$RESPONSE" | grep -o "https://github.com/[^\"]*linux-x64[^\"]*"
          
          echo "--- 结论 ---"
          if [ -z "$(echo "$RESPONSE" | grep -o "https://github.com/[^\"]*linux-x64[^\"]*")" ]; then
            echo "错误：未能在最新的 Release 中找到 linux-x64 相关文件。"
          else
            echo "已成功找到，请使用上方输出的链接进行下载。"
          fi

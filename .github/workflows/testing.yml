name: Ultimate Structure Probe

on:
  workflow_dispatch:

jobs:
  probe-job:
    runs-on: ubuntu-latest
    steps:
      - name: 下载并查看真相
        run: |
          # 1. 下载
          wget -q https://github.com/nilaoda/N_m3u8DL-RE/releases/download/v0.3.0-beta/N_m3u8DL-RE_linux-x64.tar.gz
          
          # 2. 打印压缩包内的所有文件列表 (这是最关键的一步)
          echo "--- 压缩包内部结构 ---"
          tar -tf N_m3u8DL-RE_linux-x64.tar.gz
          
          # 3. 解压并确认文件权限
          tar -zxvf N_m3u8DL-RE_linux-x64.tar.gz
          echo "--- 文件权限状态 ---"
          ls -l N_m3u8DL-RE

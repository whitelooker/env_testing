name: Ultimate Probe

on:
  workflow_dispatch:

jobs:
  probe-job:
    runs-on: ubuntu-latest
    steps:
      - name: 探测网络与文件
        run: |
          echo "--- 1. 检查网络连通性 ---"
          curl -I https://github.com/nilaoda/N_m3u8DL-RE/releases/download/v0.3.0-beta/N_m3u8DL-RE_linux-x64.tar.gz
          
          echo "--- 2. 下载并显示前 100 字节内容 (检查是否为404报错) ---"
          curl -L https://github.com/nilaoda/N_m3u8DL-RE/releases/download/v0.3.0-beta/N_m3u8DL-RE_linux-x64.tar.gz | head -c 100
          
          echo -e "\n--- 3. 检查系统是否存在 ffmpeg ---"
          command -v ffmpeg || echo "FFmpeg 未找到"
